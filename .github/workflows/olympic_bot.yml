name: Olympic GYM Bot

on:
  schedule:
    # 4 bloques de 6 horas cubren las 24h del día
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'true = solo detecta sin reservar (prueba)'
        required: false
        default: 'false'

env:
  TZ: America/Santiago

jobs:
  reservar:
    name: Reservar clase Olympic GYM
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias Python
        run: pip install -r requirements.txt

      - name: Instalar Playwright Chromium (una sola vez por bloque)
        run: python -m playwright install --with-deps chromium

      # ---------------------------------------------------------------
      # Bucle de 6 horas:
      #   - Despierta en HH:58 (2 min antes de cada hora en punto)
      #   - Ventana: HH:58 → HH+1:15 (17 min)
      #   - Duerme hasta el próximo HH:58
      #   - Repite ~6 veces antes de que el siguiente bloque arranque
      # ---------------------------------------------------------------
      - name: Bucle continuo de reservas (6 horas)
        env:
          OLYMPIC_EMAIL:      ${{ secrets.OLYMPIC_EMAIL }}
          OLYMPIC_PASSWORD:   ${{ secrets.OLYMPIC_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          HEADLESS:           'true'
          DRY_RUN:            ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          export TZ=America/Santiago
          BLOCK_END=$(( $(date +%s) + 6*3600 - 300 ))

          while [ $(date +%s) -lt $BLOCK_END ]; do
            START=$(date +"%H:%M")
            END=$(date -d "+17 minutes" +"%H:%M")
            echo "=============================="
            echo "Intento: $START → $END (Santiago)"
            echo "=============================="

            TARGET_START_TIME=$START TARGET_END_TIME=$END python main.py || true

            # Calcular próximo HH:58 (2 min antes de la siguiente hora en punto)
            NOW_EPOCH=$(date +%s)
            CURRENT_HOUR_EPOCH=$(date -d "$(date +%H):00:00" +%s)
            THIS_58=$(( CURRENT_HOUR_EPOCH + 58*60 ))

            if [ $NOW_EPOCH -ge $THIS_58 ]; then
              NEXT_WAKEUP=$(( CURRENT_HOUR_EPOCH + 3600 + 58*60 ))
            else
              NEXT_WAKEUP=$THIS_58
            fi

            SLEEP_SECS=$(( NEXT_WAKEUP - NOW_EPOCH ))

            if [ $SLEEP_SECS -gt 60 ]; then
              echo "Durmiendo $(( SLEEP_SECS / 60 )) min hasta próximo HH:58..."
              sleep $SLEEP_SECS
            fi
          done

          echo "Bloque de 6h completado."
