name: Olympic GYM Bot

on:
  schedule:
    - cron: '0 * * * *'   # cada hora en punto (00:00, 01:00, 02:00 ... 23:00)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'true = solo detecta sin reservar (prueba)'
        required: false
        default: 'false'

env:
  TZ: America/Santiago

jobs:
  reservar:
    name: Reservar clase Olympic GYM
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias Python
        run: pip install -r requirements.txt

      - name: Instalar Playwright Chromium
        run: python -m playwright install --with-deps chromium

      - name: Calcular ventana de 15 min desde ahora (hora Chile)
        id: window
        run: |
          export TZ=America/Santiago
          START=$(date +"%H:%M")
          END=$(date -d "+15 minutes" +"%H:%M")
          echo "start=$START" >> $GITHUB_OUTPUT
          echo "end=$END"     >> $GITHUB_OUTPUT
          echo "Ventana activa: $START → $END hora Santiago"

      - name: Ejecutar bot
        env:
          OLYMPIC_EMAIL:        ${{ secrets.OLYMPIC_EMAIL }}
          OLYMPIC_PASSWORD:     ${{ secrets.OLYMPIC_PASSWORD }}
          TELEGRAM_BOT_TOKEN:   ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:     ${{ secrets.TELEGRAM_CHAT_ID }}
          HEADLESS:             'true'
          DRY_RUN:              ${{ github.event.inputs.dry_run || 'false' }}
          TARGET_START_TIME:    ${{ steps.window.outputs.start }}
          TARGET_END_TIME:      ${{ steps.window.outputs.end }}
        run: python main.py
