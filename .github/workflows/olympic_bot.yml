name: Olympic GYM Bot

on:
  schedule:
    # 4 bloques de 6 horas cubren las 24h del día (hora UTC):
    #   00:00 UTC = 21:00 o 20:00 Santiago (bloque noche)
    #   06:00 UTC = 03:00 o 02:00 Santiago (bloque madrugada)
    #   12:00 UTC = 09:00 o 08:00 Santiago (bloque mañana)
    #   18:00 UTC = 15:00 o 14:00 Santiago (bloque tarde)
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'true = solo detecta sin reservar (prueba)'
        required: false
        default: 'false'

env:
  TZ: America/Santiago

jobs:
  reservar:
    name: Reservar clase Olympic GYM
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6 horas exactas (límite de GitHub Actions)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias Python
        run: pip install -r requirements.txt

      - name: Instalar Playwright Chromium
        run: python -m playwright install --with-deps chromium

      # ----------------------------------------------------------------
      # Bucle continuo: cada hora calcula la ventana de 15 min y corre
      # el bot. Entre intentos duerme hasta la próxima hora en punto.
      # El instalador ya corrió → no se repite.
      # ----------------------------------------------------------------
      - name: Bucle de reservas (6 horas continuas)
        env:
          OLYMPIC_EMAIL:      ${{ secrets.OLYMPIC_EMAIL }}
          OLYMPIC_PASSWORD:   ${{ secrets.OLYMPIC_PASSWORD }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          HEADLESS:           'true'
          DRY_RUN:            ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          export TZ=America/Santiago
          # Parar 5 min antes del límite de 6 h para evitar corte abrupto
          BLOCK_END=$(( $(date +%s) + 6*3600 - 300 ))

          while [ $(date +%s) -lt $BLOCK_END ]; do
            START=$(date +"%H:%M")
            END=$(date -d "+15 minutes" +"%H:%M")
            echo "=============================="
            echo "Intento: $START → $END (Santiago)"
            echo "=============================="

            TARGET_START_TIME=$START TARGET_END_TIME=$END python main.py || true

            # Dormir hasta la próxima hora en punto
            NEXT_HOUR=$(date -d "$(date +%H:00) +1 hour" +%s)
            NOW=$(date +%s)
            SLEEP_SECS=$(( NEXT_HOUR - NOW ))

            if [ $SLEEP_SECS -gt 60 ]; then
              echo "Durmiendo $((SLEEP_SECS / 60)) min hasta la próxima hora..."
              sleep $SLEEP_SECS
            fi
          done

          echo "Bloque de 6 h completado."
